<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 자산</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">나의 자산 관리</h1>
        <div id="total" class="text-2xl font-bold mb-6 text-center">0 원</div>
        <div class="space-y-4">
            <div class="flex items-center">
                <span class="w-16">법인</span>
                <input type="number" id="asset1" value="0" class="border p-2 w-full rounded" onchange="update()">
            </div>
            <div class="flex items-center">
                <span class="w-16">부동산</span>
                <input type="number" id="asset2" value="0" class="border p-2 w-full rounded" onchange="update()">
            </div>
            <div class="flex items-center">
                <span class="w-16">금융</span>
                <input type="number" id="asset3" value="0" class="border p-2 w-full rounded" onchange="update()">
            </div>
        </div>
    </div>

    <script>
        // 저장된 데이터 불러오기
        const saved = JSON.parse(localStorage.getItem('myAssets')) || { a1: 0, a2: 0, a3: 0 };
        document.getElementById('asset1').value = saved.a1;
        document.getElementById('asset2').value = saved.a2;
        document.getElementById('asset3').value = saved.a3;
        calc();

        function update() {
            const data = {
                a1: Number(document.getElementById('asset1').value),
                a2: Number(document.getElementById('asset2').value),
                a3: Number(document.getElementById('asset3').value)
            };
            localStorage.setItem('myAssets', JSON.stringify(data));
            calc();
        }

        function calc() {
            const total = Number(document.getElementById('asset1').value) + 
                          Number(document.getElementById('asset2').value) + 
                          Number(document.getElementById('asset3').value);
            document.getElementById('total').innerText = total.toLocaleString() + ' 원';
        }
    </script>
</body>
</html>
