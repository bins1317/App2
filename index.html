<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 자산 앱 1.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body class="bg-gray-100">
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide-react"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = Recharts;

function App() {
const [assets, setAssets] = useState(() => JSON.parse(localStorage.getItem('myAssets')) || {
법인: 0, 부동산: 0, 금융자산: 0
});

useEffect(() => {
localStorage.setItem('myAssets', JSON.stringify(assets));
}, [assets]);

const updateAsset = (name, value) => {
setAssets(prev => ({ ...prev, [name]: Number(value) }));
};

const data = [
{ name: '법인', value: assets.법인, color: '#3b82f6' },
{ name: '부동산', value: assets.부동산, color: '#10b981' },
{ name: '금융', value: assets.금융자산, color: '#8b5cf6' },
 ];

return (
<div className="w-full max-w-md mx-auto h-screen bg-white shadow-xl flex flex-col">
<header className="p-5 font-bold text-xl border-b text-gray-800">나의 자산 1.0</header>
<main className="flex-1 p-5 overflow-y-auto">
<div className="h-64">
<ResponsiveContainer width="100%" height="100%">
<PieChart>
<Pie data={data} dataKey="value" innerRadius={60} outerRadius={80} fill="#8884d8">
{data.map((entry, index) => <Cell key={index} fill={entry.color} />)}
</Pie>
<Tooltip />
</PieChart>
</ResponsiveContainer>
</div>
<div className="mt-5 space-y-4">
<InputField label="법인 자산" value={assets.법인} onSave={(v) => updateAsset('법인', v)} />
<InputField label="부동산 자산" value={assets.부동산} onSave={(v) => updateAsset('부동산', v)} />
<InputField label="금융 자산" value={assets.금융자산} onSave={(v) => updateAsset('금융자산', v)} />
</div>
</main>
</div>
);
}

function InputField({ label, value, onSave }) {
const [val, setVal] = useState(value);
return (
<div className="flex gap-2 items-center">
<span className="w-20 text-xs font-bold">{label}</span>
<input type="number" value={val} onChange={(e) => setVal(e.target.value)} className="border p-2 rounded w-full text-xs" />
<button onClick={() => onSave(val)} className="bg-purple-600 text-white px-3 py-2 rounded text-xs font-bold">저장</button>
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
