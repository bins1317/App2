<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 자산 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root">로딩중...</div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [assets, setAssets] = useState({ 법인: 0, 부동산: 0, 금융자산: 0 });

            useEffect(() => {
                const saved = localStorage.getItem('myAssets');
                if (saved) setAssets(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('myAssets', JSON.stringify(assets));
            }, [assets]);

            const total = assets.법인 + assets.부동산 + assets.금융자산;

            return (
                <div className="p-4 max-w-md mx-auto">
                    <h1 className="text-xl font-bold mb-4">나의 자산: {total.toLocaleString()}원</h1>
                    <div className="space-y-4">
                        {Object.entries(assets).map(([key, value]) => (
                            <div key={key} className="flex gap-2">
                                <span className="w-16">{key}</span>
                                <input type="number" value={value} 
                                       onChange={(e) => setAssets(prev => ({...prev, [key]: Number(e.target.value)}))}
                                       className="border p-2 w-full rounded" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
